<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Content Factory — Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  /* ===== App layout (matches Source Input shell) ===== */
  .app {
    width: 1440px;
    margin: 0 auto;
    min-height: 1024px;
    display: flex; flex-direction: column;
  }

  /* ===== Top header (identical to Source Input) ===== */
  .top-header {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .wordmark { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
  .wordmark .dot { color: var(--magenta); }
  .top-header-right { display: flex; align-items: center; gap: 14px; }
  .ws-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px 6px 12px; border-radius: 6px;
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 120ms, border-color 120ms;
  }
  .ws-btn:hover { background: var(--elev-1); border-color: var(--border-strong); }
  .ws-btn .ws-mark {
    width: 14px; height: 14px; border-radius: 3px;
    background: linear-gradient(135deg,#2A2A30,#1B1B20);
    border: 1px solid var(--border);
    font-size: 9px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg,#2E1F2A,#3A2533);
    border: 1px solid var(--border);
    color: #E5C7D6; font-size: 11px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* ===== Shell ===== */
  .shell {
    display: grid; grid-template-columns: 240px 1fr 320px;
    flex: 1; min-height: 0;
  }

  /* ===== Sidebar (identical) ===== */
  .sidebar {
    border-right: 1px solid var(--border); padding: 16px;
    display: flex; flex-direction: column;
    min-height: calc(1024px - 56px);
  }
  .new-btn {
    width: 100%; height: 36px;
    background: var(--magenta); border: none; color: #fff;
    font-size: 13px; font-weight: 500;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 120ms;
  }
  .new-btn:hover { background: #ED2F86; }
  .new-btn .plus { font-size: 14px; line-height: 1; }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 24px 4px 8px 4px;
  }
  .proj-list { display: flex; flex-direction: column; gap: 2px; }
  .proj-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 6px; cursor: pointer;
    position: relative; transition: background 120ms; min-height: 52px;
  }
  .proj-row:hover { background: rgba(255,255,255,0.025); }
  .proj-row.active { background: var(--elev-2); }
  .proj-row.active::before {
    content: ""; position: absolute; left: -16px; top: 6px; bottom: 6px;
    width: 2px; background: var(--magenta); border-radius: 0 2px 2px 0;
  }
  .thumb {
    width: 40px; height: 24px; border-radius: 3px;
    background: #1A1A1F; border: 1px solid var(--border);
    flex: 0 0 auto; overflow: hidden;
  }
  .thumb svg { display: block; width: 100%; height: 100%; }
  .proj-meta { min-width: 0; flex: 1; }
  .proj-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.3;
  }
  .proj-sub { display: flex; align-items: center; gap: 6px; margin-top: 3px; color: var(--text-muted); font-size: 11px; }
  .proj-sub .src-icon { color: var(--text-muted); display: inline-flex; }
  .proj-sub .time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .sidebar-bottom { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border-soft); }
  .settings-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 6px; color: var(--text-muted);
    font-size: 13px; cursor: pointer;
    transition: background 120ms, color 120ms;
  }
  .settings-row:hover { background: rgba(255,255,255,0.025); color: var(--text); }

  /* ===== Main ===== */
  .main { padding: 24px 32px 40px 32px; min-width: 0; }

  /* breadcrumb / project meta row */
  .crumb-row {
    display: flex; align-items: center; justify-content: space-between;
    height: 28px;
  }
  .crumb-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .all-projects-btn {
    background: transparent; border: none;
    color: var(--text-muted);
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 4px;
    transition: color 120ms, background 120ms;
  }
  .all-projects-btn:hover { color: var(--text); background: var(--elev-1); }
  .crumb-sep { color: var(--text-dim); }
  .crumb-name {
    color: var(--text); font-size: 14px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .crumb-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted);
  }
  .crumb-status .gd {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 0 3px rgba(45,106,79,0.18);
  }
  .crumb-right {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted);
  }
  .crumb-right strong { color: var(--text); font-weight: 500; }

  /* Player */
  .player-wrap {
    margin-top: 24px;
    display: flex; flex-direction: column; align-items: center;
    width: 100%;
  }
  .player-shell { position: relative; width: 720px; max-width: 100%; }
  .player-glow {
    position: absolute; inset: -60px;
    background:
      radial-gradient(circle at 0% 50%, rgba(229,38,124,0.14), transparent 38%),
      radial-gradient(circle at 100% 50%, rgba(229,38,124,0.10), transparent 38%);
    pointer-events: none;
    border-radius: 24px;
    filter: blur(2px);
  }
  .player {
    position: relative;
    width: 720px;
    aspect-ratio: 16 / 9;
    background: #08080A;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
  }
  .player-frame-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 90%, rgba(229,38,124,0.08), transparent 50%),
      #08080A;
  }
  .first-frame {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 0 80px;
    gap: 14px;
  }
  .ff-line-1 {
    color: var(--magenta);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .ff-line-2 {
    color: #DADAE0;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .play-button {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--magenta);
    border: none;
    color: #fff;
    box-shadow: 0 12px 28px -10px rgba(229,38,124,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 120ms, background 120ms;
  }
  .play-button:hover { background: #ED2F86; transform: translate(-50%, -50%) scale(1.04); }
  .play-button svg { transform: translateX(2px); }

  .player-controls {
    width: 720px;
    height: 28px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
  }
  .timecode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .timecode .now { color: var(--text); }
  .scrub {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    position: relative;
  }
  .scrub-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 1.2%;
    background: var(--magenta);
    border-radius: 4px;
  }
  .scrub-thumb {
    position: absolute; left: 1.2%; top: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 0 3px rgba(229,38,124,0.18);
  }
  .ctrl-icons { display: flex; align-items: center; gap: 4px; }
  .ctrl-icon-btn {
    width: 26px; height: 26px;
    background: transparent; border: none;
    color: var(--text-muted);
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
    transition: color 120ms, background 120ms;
  }
  .ctrl-icon-btn:hover { color: var(--text); background: var(--elev-1); }

  /* Action row */
  .actions {
    margin-top: 24px;
    display: grid;
    grid-template-columns: 2fr 1.5fr 1.5fr;
    gap: 12px;
  }
  .btn {
    height: 40px;
    border-radius: 6px;
    font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 120ms, border-color 120ms, transform 80ms;
    padding: 0 14px;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--magenta); color: #fff; border: 1px solid var(--magenta);
  }
  .btn-primary:hover { background: #ED2F86; }
  .btn-ghost {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--elev-1); border-color: var(--border-strong); }

  /* Metadata grid */
  .meta-grid {
    margin-top: 24px;
    border: 1px solid var(--border);
    border-radius: 6px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    overflow: hidden;
    background: var(--elev-1);
  }
  .meta-cell-r {
    padding: 16px;
    height: 64px;
    display: flex; flex-direction: column; justify-content: center; gap: 6px;
    border-right: 1px solid var(--border);
  }
  .meta-cell-r:last-child { border-right: none; }
  .meta-cell-r .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .meta-cell-r .val {
    font-size: 14px; font-weight: 500; color: var(--text);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .meta-cell-r .ratio-rect {
    display: inline-block;
    width: 18px; height: 11px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    background: rgba(255,255,255,0.025);
  }

  /* ===== Right panel ===== */
  .rpanel {
    border-left: 1px solid var(--border);
    padding: 20px 16px 24px 16px;
    display: flex; flex-direction: column;
    min-height: calc(1024px - 56px);
  }
  .rpanel-h {
    font-size: 13px; font-weight: 500; color: var(--text);
    margin: 0 0 14px 0;
  }
  .decisions { display: flex; flex-direction: column; }
  .decision-item {
    display: grid;
    grid-template-columns: 16px 1fr 14px;
    gap: 10px;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: background 120ms;
  }
  .decision-item:hover { background: rgba(255,255,255,0.02); }
  .decision-item:last-child { border-bottom: none; }
  .di-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 0 3px rgba(45,106,79,0.18);
    margin-left: 4px;
  }
  .di-text { min-width: 0; }
  .di-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .di-result {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0.8;
  }
  .di-chev { color: var(--text-dim); display: inline-flex; opacity: 0.5; }

  .rsection-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 20px 0 10px 0;
  }
  .quick-list { display: flex; flex-direction: column; gap: 6px; }
  .chip-btn {
    height: 36px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 0 12px;
    font-size: 13px;
    text-align: left;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background 120ms, border-color 120ms, color 120ms;
  }
  .chip-btn:hover { background: var(--elev-1); border-color: var(--border-strong); }
  .chip-btn .ic { color: var(--text-muted); display: inline-flex; }
  .chip-btn:hover .ic { color: var(--magenta); }

  .voice-list { display: flex; flex-direction: column; gap: 6px; }
  .voice-card {
    height: 44px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px 0 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
  }
  .voice-card:hover { border-color: var(--border-strong); }
  .voice-card.selected {
    border-color: var(--magenta);
    background: rgba(229,38,124,0.05);
  }
  .voice-card .vc-wave { width: 24px; height: 16px; color: var(--text-muted); flex: 0 0 auto; }
  .voice-card.selected .vc-wave { color: var(--magenta); }
  .voice-card .vc-name { flex: 1; font-size: 13px; color: var(--text); }
  .voice-card .vc-play {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 120ms, border-color 120ms;
  }
  .voice-card .vc-play:hover { color: var(--magenta); border-color: var(--magenta); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="source-icons.jsx"></script>
  <script type="text/babel" src="result-icons.jsx"></script>
  <script type="text/babel" src="result.jsx"></script>
</body>
</html>
