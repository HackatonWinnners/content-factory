<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Content Factory — Agent Thinking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0B;
    --elev-1: #111113;
    --elev-2: #16161A;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #ECECEE;
    --text-muted: #8A8A93;
    --text-dim: #5C5C66;
    --magenta: #E5267C;
    --magenta-soft: rgba(229, 38, 124, 0.14);
    --green: #2D6A4F;
    --green-glow: rgba(45, 106, 79, 0.35);
    --amber: #8B6B1F;
    --red: #7A2E2E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font-family: inherit; cursor: pointer; }

  /* ==== App shell ==== */
  .app {
    width: 1440px;
    margin: 0 auto;
    min-height: 900px;
    display: flex;
    flex-direction: column;
  }

  /* ==== Header ==== */
  .header {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    position: relative;
    background: var(--bg);
  }
  .header-left {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .back-btn {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: background 120ms, color 120ms;
  }
  .back-btn:hover { background: var(--elev-1); color: var(--text); }
  .project-crumb {
    color: var(--text);
    font-weight: 400;
  }
  .crumb-sep { color: var(--text-dim); margin: 0 2px; }

  .header-center {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    min-width: 360px;
  }
  .header-title-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 500; color: var(--text);
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 0 0 var(--magenta);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(229,38,124,0.55); }
    70% { box-shadow: 0 0 0 6px rgba(229,38,124,0); }
    100% { box-shadow: 0 0 0 0 rgba(229,38,124,0); }
  }
  .progress-track {
    width: 320px; height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--magenta);
    width: 38%;
    border-radius: 2px;
    position: relative;
    transition: width 800ms ease;
  }
  .progress-fill::after {
    content: ""; position: absolute; right: 0; top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, rgba(229,38,124,0.6));
    animation: shimmer 1.8s linear infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-40px); opacity: 0.4; }
    100% { transform: translateX(0); opacity: 0.9; }
  }

  .header-right {
    display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  }
  .eta { color: var(--text-muted); font-size: 12px; }
  .ghost-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    transition: all 120ms;
  }
  .ghost-btn:hover { background: var(--elev-1); color: var(--text); border-color: var(--border-strong); }

  /* ==== Body grid ==== */
  .body-grid {
    display: grid;
    grid-template-columns: 860px 1fr;
    flex: 1;
    min-height: 0;
  }
  .col-left {
    border-right: 1px solid var(--border);
    padding: 28px 32px 40px 32px;
  }
  .col-right {
    padding: 28px 32px 40px 32px;
  }
  .col-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: none;
    letter-spacing: 0;
    margin: 0 0 20px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .col-title .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* ==== Decision cards ==== */
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--elev-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    transition: background 160ms, border-color 160ms;
  }
  .card.done {
    border-left: 2px solid var(--magenta);
    padding-left: 15px;
  }
  .card.in-progress {
    background: var(--elev-2);
    border-left: 2px solid var(--magenta);
    padding-left: 15px;
    box-shadow: 0 0 0 1px rgba(229,38,124,0.10), 0 18px 40px -24px rgba(229,38,124,0.35);
  }
  .card.pending {
    opacity: 0.4;
  }
  .card-top {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .status-dot {
    flex: 0 0 auto;
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .status-dot.done {
    background: #2D6A4F;
    box-shadow: 0 0 0 3px rgba(45,106,79,0.18);
  }
  .status-dot.progress {
    background: var(--magenta);
    box-shadow: 0 0 0 0 var(--magenta);
    animation: pulse 1.4s ease-out infinite;
  }
  .status-dot.pending {
    background: transparent;
    border: 1px solid var(--text-dim);
    box-shadow: none;
  }
  .decision-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .timestamp {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .timestamp.now { color: var(--magenta); }

  .card-body {
    color: #C4C4CB;
    font-size: 14px;
    line-height: 1.55;
    margin: 0;
  }
  .card.pending .card-body { color: var(--text-muted); }

  .chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 12px;
  }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .chip strong { color: var(--text); font-weight: 500; }
  .chip.feature { color: #C4C4CB; }

  /* Streaming script */
  .script-stream {
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #D4D4DC;
    white-space: pre-wrap;
    min-height: 88px;
  }
  .script-stream .caret {
    display: inline-block;
    width: 1px;
    height: 14px;
    background: var(--magenta);
    margin-left: 1px;
    transform: translateY(2px);
    animation: caret-blink 1s steps(2) infinite;
  }
  @keyframes caret-blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ==== Right column ==== */
  .preview-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0E0E10;
    border: 1px solid var(--border);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-frame::before {
    content: "";
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.012) 0 12px,
        transparent 12px 24px
      );
    pointer-events: none;
  }
  .preview-shimmer {
    position: absolute; inset: -1px;
    border-radius: 8px;
    pointer-events: none;
    background: linear-gradient(120deg,
      transparent 30%,
      rgba(229,38,124,0.10) 48%,
      transparent 65%);
    background-size: 250% 100%;
    animation: frame-shimmer 3.6s linear infinite;
    mix-blend-mode: screen;
  }
  @keyframes frame-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -100% 0; }
  }
  .preview-empty {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    z-index: 1;
  }
  .preview-empty .icon-wrap {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.015);
  }
  .preview-meta {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 12px;
  }
  .preview-meta .dot-sep { color: var(--text-dim); }

  .scene-strip-title {
    margin: 28px 0 10px 0;
    font-size: 12px;
    color: var(--text-muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .scene-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .scene {
    aspect-ratio: 16 / 9;
    border: 1px dashed var(--border-strong);
    border-radius: 6px;
    background: rgba(255,255,255,0.012);
    position: relative;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 6px;
  }
  .scene .scene-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text-dim);
  }
  .scene.next {
    border-style: solid;
    border-color: rgba(229,38,124,0.35);
    background: rgba(229,38,124,0.04);
  }
  .scene.next .scene-label { color: var(--text-muted); }
  .scene .next-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--magenta);
    animation: pulse 1.4s ease-out infinite;
  }

  .right-section + .right-section { margin-top: 32px; }

  /* ==== Footer ==== */
  .footer {
    height: 56px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: var(--bg);
  }
  .footer-left {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .footer-left .brand-name { color: var(--text); font-weight: 500; }
  .edit-btn {
    background: transparent; border: none;
    color: var(--text-dim);
    padding: 4px;
    border-radius: 4px;
    display: inline-flex; align-items: center;
    transition: color 120ms, background 120ms;
  }
  .edit-btn:hover { color: var(--text); background: var(--elev-1); }
  .footer-right {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    display: flex; gap: 18px;
  }
  .footer-right span strong { color: var(--text); font-weight: 500; }

  /* Hidden scrollbar fallback */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Icon defaults */
  .lucide {
    width: 16px; height: 16px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .lucide-sm { width: 14px; height: 14px; }
  .lucide-xs { width: 12px; height: 12px; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
