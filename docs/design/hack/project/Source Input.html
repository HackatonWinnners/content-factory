<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Content Factory — Source Input</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  /* ===== App layout ===== */
  .app {
    width: 1440px;
    margin: 0 auto;
    min-height: 1024px;
    display: flex; flex-direction: column;
  }

  /* ===== Top header ===== */
  .top-header {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .wordmark {
    font-size: 14px; font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .wordmark .dot { color: var(--magenta); }
  .top-header-right {
    display: flex; align-items: center; gap: 14px;
  }
  .ws-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 120ms, border-color 120ms;
  }
  .ws-btn:hover { background: var(--elev-1); border-color: var(--border-strong); }
  .ws-btn .ws-mark {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: linear-gradient(135deg, #2A2A30, #1B1B20);
    border: 1px solid var(--border);
    font-size: 9px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2E1F2A, #3A2533);
    border: 1px solid var(--border);
    color: #E5C7D6;
    font-size: 11px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    letter-spacing: 0.02em;
  }

  /* ===== 3-zone shell ===== */
  .shell {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    flex: 1; min-height: 0;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 16px;
    display: flex; flex-direction: column;
    min-height: calc(1024px - 56px);
  }
  .new-btn {
    width: 100%; height: 36px;
    background: var(--magenta);
    border: none;
    color: #fff;
    font-size: 13px; font-weight: 500;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 120ms, transform 80ms;
  }
  .new-btn:hover { background: #ED2F86; }
  .new-btn:active { transform: translateY(1px); }
  .new-btn .plus {
    font-size: 14px; line-height: 1; font-weight: 500;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 24px 4px 8px 4px;
  }
  .proj-list {
    display: flex; flex-direction: column;
    gap: 2px;
  }
  .proj-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 8px;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    transition: background 120ms;
    min-height: 52px;
  }
  .proj-row:hover { background: rgba(255,255,255,0.025); }
  .proj-row.active {
    background: var(--elev-2);
  }
  .proj-row.active::before {
    content: "";
    position: absolute; left: -16px; top: 6px; bottom: 6px;
    width: 2px;
    background: var(--magenta);
    border-radius: 0 2px 2px 0;
  }
  .thumb {
    width: 40px; height: 24px;
    border-radius: 3px;
    background: #1A1A1F;
    border: 1px solid var(--border);
    flex: 0 0 auto;
    overflow: hidden;
    position: relative;
  }
  .thumb svg { display: block; width: 100%; height: 100%; }
  .proj-meta { min-width: 0; flex: 1; }
  .proj-name {
    font-size: 13px; font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.3;
  }
  .proj-sub {
    display: flex; align-items: center; gap: 6px;
    margin-top: 3px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .proj-sub .src-icon { color: var(--text-muted); display: inline-flex; }
  .proj-sub .time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }

  .sidebar-bottom {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
  }
  .settings-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 8px;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: background 120ms, color 120ms;
  }
  .settings-row:hover { background: rgba(255,255,255,0.025); color: var(--text); }

  /* ===== Main ===== */
  .main {
    padding: 24px 32px 32px 32px;
    min-width: 0;
    overflow: hidden;
  }
  .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin: 0 0 4px 0; letter-spacing: -0.01em; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin: 0; }

  .tabs {
    display: flex; align-items: center; gap: 32px;
    margin-top: 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: transparent; border: none;
    padding: 10px 0;
    color: var(--text-muted);
    font-size: 14px; font-weight: 500;
    position: relative;
    transition: color 120ms;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); }
  .tab.active::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--magenta);
    border-radius: 1px 1px 0 0;
  }

  /* URL input */
  .url-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 20px;
  }
  .url-input {
    flex: 1;
    height: 44px;
    background: var(--elev-1);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center;
    padding: 0 14px;
    transition: border-color 120ms;
  }
  .url-input:focus-within { border-color: var(--border-strong); }
  .url-input input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-left: 10px;
  }
  .conn-pill {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 12px; height: 44px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .conn-pill .gd {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.18);
  }
  .conn-pill .who { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  /* time pills */
  .pills {
    display: flex; gap: 4px;
    margin-top: 12px;
  }
  .pill {
    height: 30px;
    padding: 0 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 12.5px;
    transition: all 120ms;
  }
  .pill:hover { color: var(--text); border-color: var(--border-strong); }
  .pill.active {
    color: var(--magenta);
    background: var(--magenta-bg);
    border-color: rgba(229,38,124,0.35);
  }

  /* repo metadata */
  .meta-card {
    margin-top: 24px;
    background: var(--elev-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .meta-cell .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .meta-cell .val {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .lang-chips { display: inline-flex; gap: 6px; }
  .lang-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .lang-chip .ldot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  /* filter strip */
  .filter-row {
    margin-top: 24px;
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 8px;
  }
  .filter-text { font-size: 13px; color: var(--text-muted); }
  .filter-text .accent { color: var(--magenta); font-weight: 600; }
  .show-all-btn {
    background: transparent; border: none;
    color: var(--text-muted);
    font-size: 12.5px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 120ms, background 120ms;
  }
  .show-all-btn:hover { color: var(--text); background: var(--elev-1); }

  /* commit list */
  .commits {
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .commit {
    display: grid;
    grid-template-columns: 16px 80px 1fr auto;
    align-items: center;
    gap: 16px;
    height: 56px;
    padding: 0 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 120ms;
    cursor: pointer;
  }
  .commit:not(.dim):hover, .commit.hovered { background: var(--elev-1); }
  .commit.dim { opacity: 0.4; cursor: default; }
  .commit.dim:hover { background: transparent; }

  .uf-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 0 3px rgba(229,38,124,0.14);
  }
  .uf-dot.empty {
    background: transparent;
    border: 1px solid var(--text-dim);
    box-shadow: none;
    opacity: 0.6;
  }
  .commit .sha {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .commit .msg {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  .commit .msg .scope {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    font-size: 12.5px;
  }
  .commit-author {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
  }
  .author-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid var(--border);
    color: #fff;
    font-size: 9px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    letter-spacing: 0;
  }
  .commit-author .name { color: var(--text-muted); }
  .commit-author .ago { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }

  /* ===== Right panel ===== */
  .rpanel {
    border-left: 1px solid var(--border);
    padding: 16px;
    display: flex; flex-direction: column;
    min-height: calc(1024px - 56px);
  }
  .rcard {
    background: var(--elev-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .rcard + .rcard { margin-top: 16px; }
  .rcard-title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .rcard-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .ghost-icon-btn {
    background: transparent; border: none;
    color: var(--text-dim);
    padding: 4px;
    border-radius: 4px;
    display: inline-flex;
    transition: color 120ms, background 120ms;
  }
  .ghost-icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }

  .brand-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .brand-pills {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 10px;
  }
  .brand-pill {
    font-size: 11.5px;
    color: var(--text);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .brand-meta {
    margin-top: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .check {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(45,106,79,0.2);
    color: #6FBF95;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* format options */
  .fmt-list { display: flex; flex-direction: column; gap: 8px; }
  .fmt-opt {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
    text-align: left; width: 100%;
    color: var(--text);
  }
  .fmt-opt:hover { border-color: var(--border-strong); }
  .fmt-opt.selected {
    border-color: var(--magenta);
    background: var(--magenta-bg);
  }
  .fmt-preview {
    flex: 0 0 auto;
    border: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.025);
    border-radius: 2px;
  }
  .fmt-preview.vertical { width: 16px; height: 28px; }
  .fmt-preview.horizontal { width: 36px; height: 20px; }
  .fmt-opt.selected .fmt-preview { border-color: var(--magenta); background: rgba(229,38,124,0.1); }
  .fmt-opt-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .fmt-label { font-size: 13px; font-weight: 500; }
  .fmt-sub { font-size: 11px; color: var(--text-muted); }
  .fmt-radio {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    flex: 0 0 auto;
    position: relative;
  }
  .fmt-opt.selected .fmt-radio { border-color: var(--magenta); }
  .fmt-opt.selected .fmt-radio::after {
    content: ""; position: absolute; inset: 3px;
    border-radius: 50%;
    background: var(--magenta);
  }

  /* voice card */
  .voice-row {
    display: flex; align-items: center; gap: 10px;
  }
  .wave {
    flex: 0 0 auto;
    width: 64px; height: 22px;
    color: var(--magenta);
  }
  .voice-name { font-size: 13px; font-weight: 500; flex: 1; }
  .play-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text);
    display: inline-flex; align-items: center; justify-content: center;
    transition: border-color 120ms, color 120ms;
  }
  .play-btn:hover { border-color: var(--magenta); color: var(--magenta); }
  .voice-more {
    margin-top: 12px;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--text-muted);
    font-size: 12px;
    padding: 6px 2px 0;
    border-top: 1px solid var(--border-soft);
    cursor: pointer;
  }
  .voice-more:hover { color: var(--text); }

  /* CTA */
  .cta-area { margin-top: auto; padding-top: 16px; }
  .cta-btn {
    width: 100%; height: 44px;
    background: var(--magenta);
    border: none;
    color: #fff;
    font-size: 14px; font-weight: 500;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 120ms, transform 80ms;
  }
  .cta-btn:hover { background: #ED2F86; }
  .cta-btn:active { transform: translateY(1px); }
  .cta-sub {
    margin-top: 8px;
    text-align: center;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="source-icons.jsx"></script>
  <script type="text/babel" src="source-input.jsx"></script>
</body>
</html>
